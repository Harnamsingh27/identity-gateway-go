name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run --timeout 5m ./...
        env:
          GOFLAGS: -mod=vendor

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: false

      - name: go vet
        run: go vet ./...
        env:
          GOFLAGS: -mod=vendor

      - name: Test with race detector
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
        env:
          GOFLAGS: -mod=vendor

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Run integration tests
        run: go test -v ./test/integration/...
        env:
          GOFLAGS: -mod=vendor

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Build gateway binary
        run: go build -o bin/gateway ./cmd/gateway/...
        env:
          GOFLAGS: -mod=vendor

      - name: Build fake backends
        run: |
          go build ./services/fake-backend-a/...
          go build ./services/fake-backend-b/...
          go build ./services/fake-backend-c/...
        env:
          GOFLAGS: -mod=vendor

  smoke:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up --build -d

      - name: Wait for gateway
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/healthz && break
            sleep 2
          done

      - name: Smoke test health endpoint
        run: curl -sf http://localhost:8080/healthz

      - name: Tear down
        if: always()
        run: docker compose down
